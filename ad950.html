<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>AD 950</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%; height: 100%;
      background: #000;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden;
    }
    video {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }
  </style>
</head>
<body>
  <video
    id="v"
    src="fotos/ad950.mp4"
    autoplay
    muted
    playsinline
    preload="auto"
  ></video>

  <script>
    const v = document.getElementById('v');
    v.playbackRate = 1;
    v.play().catch(() => {});
  </script>
</body>
</html>
